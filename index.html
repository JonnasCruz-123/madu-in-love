<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8fd3ff">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Madu in Love</title>
  <link rel="stylesheet" href="game.css?v=8">
</head>
<body>
  <!-- Aviso pra deitar o celular (aparece só em retrato) -->
  <div id="orient">
    <div class="orient-card">
      <div class="orient-phone">📱↻</div>
      <p>Gire o celular para jogar<br><small>modo paisagem</small></p>
    </div>
  </div>

  <!-- MENU inicial (a arte do menu que você fez) -->
  <div id="menu">
    <div class="menu-frame">
      <button class="menu-hot" id="startBtn" style="left:40.5%; top:76.8%; width:19%; height:7.2%"></button>
      <button class="menu-hot" id="cfgBtn"   style="left:41.6%; top:85.2%; width:16.6%; height:6%"></button>
      <button class="menu-hot" id="achBtn"   style="left:42.5%; top:92%;  width:15%; height:6%"></button>
    </div>
    <button class="fs-btn" id="fsMenuBtn" type="button" aria-label="Tela cheia">⛶</button>
    <div class="menu-ver">v8 · tela cheia</div>
    <div class="menu-toast" id="menuToast"></div>
  </div>

  <!-- JOGO (plataforma, paisagem) -->
  <div class="stage" id="stage" hidden>
    <div class="cloud" style="left:10%; top:12%; width:64px; height:24px;"></div>
    <div class="cloud" style="left:58%; top:8%;  width:86px; height:30px;"></div>
    <div class="cloud" style="left:84%; top:18%; width:54px; height:20px;"></div>

    <!-- HUD -->
    <div class="hud">
      <div class="coins"><span class="coin">◉</span> <span id="coinCount">0</span></div>
    </div>

    <!-- Plataformas (posicionadas por JS) -->
    <div id="platforms"></div>

    <!-- Chao -->
    <div id="ground"></div>

    <!-- Personagem -->
    <div class="player" id="player"><div class="sprite" id="sprite"></div></div>

    <!-- Controles -->
    <div class="joystick" id="joystick"><div class="knob" id="knob"></div></div>
    <button class="shoot-btn" id="shootBtn" type="button" aria-label="Atirar">♥</button>
    <button class="jump-btn" id="jumpBtn" type="button">PULAR</button>

    <button class="menu-back" id="backBtn" type="button" aria-label="Voltar ao menu">☰</button>
    <button class="fs-btn fs-btn-game" id="fsGameBtn" type="button" aria-label="Tela cheia">⛶</button>
  </div>

  <script src="game.js?v=8"></script>
</body>
</html>
