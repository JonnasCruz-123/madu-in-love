<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Madu — Mini Game 🚶</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <div class="stage" id="stage">
    <div class="cloud" style="left:12%; top:14%; width:60px; height:24px;"></div>
    <div class="cloud" style="left:62%; top:9%;  width:80px; height:28px;"></div>
    <div class="cloud" style="left:82%; top:22%; width:50px; height:20px;"></div>

    <div class="player" id="player">
      <div class="sprite" id="sprite"></div>
    </div>

    <!-- Joystick virtual (toque ou mouse) -->
    <div class="joystick" id="joystick">
      <div class="knob" id="knob"></div>
    </div>

    <!-- HUD com ajustes ao vivo -->
    <div class="hud">
      <h1>🕹️ Controles</h1>
      <label>Velocidade
        <input id="speed" type="range" min="60" max="500" step="10" value="240">
        <span class="val" id="speedVal"></span>
      </label>
      <label>Passada
        <input id="walk" type="range" min="0.3" max="1.4" step="0.05" value="0.7">
        <span class="val" id="walkVal"></span>
      </label>
      <label>Tamanho
        <input id="scale" type="range" min="0.3" max="1.2" step="0.05" value="0.55">
        <span class="val" id="scaleVal"></span>
      </label>
      <div class="hint">Arraste o joystick ou use WASD / setas</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
